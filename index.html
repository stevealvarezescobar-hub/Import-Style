<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import Style </title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    header {
      background-color: #d6222257;
      color: rgba(31, 27, 27, 0.925);
      padding: 15px;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      background-color: #1a18186e;
    }

    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
    }

    nav a:hover {
      background-color: #d6222257;
    }

    .container {
      padding: 20px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .product {
      background: rgb(161, 158, 158);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .product h3 {
      margin: 10px 0;
    }

    .product p {
      color: #d6222257;
      font-weight: bold;
    }

    .product button {
      padding: 10px;
      background-color: #111;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .product button:hover {
      background-color: #555;
    }

    footer {
      background-color: #111;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Import Style</h1>
  <p>Las mejores prendas al mejor precio</p>
</header>

<nav>
  <a href="#">Inicio</a>
  <a href="#">Hombres</a>
  <a href="#">Mujeres</a>
  <a href="#">Contacto</a>
</nav>

<div class="container">
  <h2>Productos</h2>
  <div class="products">

    <div class="product">
      <img src="https://via.placeholder.com/200" alt="Camiseta">
      <h3>Camiseta Básica</h3>
      <p>$10.00</p>
      <button onclick="comprar('Camiseta Básica')">Comprar</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/200" alt="Jeans">
      <h3>Jeans</h3>
      <p>$25.00</p>
      <button onclick="comprar('Jeans')">Comprar</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/200" alt="Chaqueta">
      <h3>Chaqueta</h3>
      <p>$40.00</p>
      <button onclick="comprar('Chaqueta')">Comprar</button>
    </div>

  </div>
</div>

<footer>
  <p>&copy; 2026 Import Style</p>
</footer>

<script>
  function comprar(producto) {
    alert('Has seleccionado: ' + producto);
  }
</script>

</body>
</html>
